<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — SmartTraffic.AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>SmartTraffic.AI</h1>
        <div class="links">
            <a href="profile.html">Profile</a>
            <a href="index.html" id="nav-upload-link">Upload</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="rule_breakers.html">Violations</a>
            <a href="login.html" class="active" id="nav-login-link">Login</a>
            <button type="button" id="nav-logout-btn" class="nav-link-btn" style="display:none">Logout</button>
        </div>
    </nav>

    <main class="hero">
        <div class="glass-panel" style="width: 100%; max-width: 480px; margin: 0 auto; text-align: left;">
            <h2 style="margin-bottom: 8px; text-align: center;">Create Account</h2>
            <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1.25rem; text-align: center;">
                Sign up to view your regional traffic profile.
            </p>
            <form id="signup-form" onsubmit="submitSignup(event)" autocomplete="on">
                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">First Name</label>
                        <input type="text" id="first_name" name="first_name" required class="login-input" placeholder="John" style="width:100%;" />
                    </div>
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">Last Name</label>
                        <input type="text" id="last_name" name="last_name" required class="login-input" placeholder="Doe" style="width:100%;" />
                    </div>
                </div>

                <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">User ID</label>
                <input type="text" id="user_id" name="user_id" required class="login-input" placeholder="johndoe123" style="width:100%; margin-bottom: 1rem;" />

                <div style="display: flex; gap: 10px; margin-bottom: 1rem;">
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">Region</label>
                        <input type="text" id="region" name="region" required class="login-input" placeholder="New York" style="width:100%;" />
                    </div>
                    <div style="flex: 1;">
                        <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">Phone Number</label>
                        <input type="tel" id="phone" name="phone" required class="login-input" placeholder="+1 234 567 8900" style="width:100%;" />
                    </div>
                </div>

                <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">Years of Experience</label>
                <input type="number" id="experience" name="experience" min="0" required class="login-input" placeholder="5" style="width:100%; margin-bottom: 1rem;" />

                <label style="display:block; margin-bottom: 8px; font-size: 0.9rem;">Password</label>
                <input type="password" id="password" name="password" required class="login-input" placeholder="Create a strong password" style="width:100%; margin-bottom: 1.5rem;" />

                <button type="submit" class="btn-primary" style="width:100%;" id="signup-btn">Sign Up</button>
                <div style="text-align: center; margin-top: 1rem;">
                    <a href="login.html" style="font-size: 0.9rem; color: var(--blue-light); text-decoration: none;">Already have an account? Login here.</a>
                </div>
            </form>
            <div id="signup-msg" style="margin-top: 16px; min-height: 24px; font-size: 0.9rem; text-align: center;"></div>
        </div>
    </main>
    <script src="config.js"></script>
    <script src="script.js"></script>

    <script>
        async function submitSignup(e) {
            e.preventDefault();
            const msg = document.getElementById("signup-msg");
            const btn = document.getElementById("signup-btn");
            const form = document.getElementById("signup-form");
            
            const fd = new FormData();
            fd.append("first_name", document.getElementById("first_name").value);
            fd.append("last_name", document.getElementById("last_name").value);
            fd.append("user_id", document.getElementById("user_id").value);
            fd.append("region", document.getElementById("region").value);
            fd.append("phone", document.getElementById("phone").value);
            fd.append("experience", document.getElementById("experience").value);
            fd.append("password", document.getElementById("password").value);
            
            btn.disabled = true;
            msg.innerText = "Creating account…";
            msg.style.color = "var(--text-secondary)";
            try {
                const r = await fetch(`${API_URL}/api/signup`, { method: "POST", body: fd, credentials: "include" });
                const data = await r.json().catch(() => ({}));
                if (!r.ok) throw new Error(data.detail || data.message || "Signup failed");
                msg.style.color = "var(--green-light)";
                msg.innerText = "Account created successfully. Redirecting to login…";
                
                // Clear query param redirect explicitly:
                window.location.href = "login.html?signup=success";

            } catch (err) {
                msg.style.color = "var(--red-light)";
                msg.innerText = err.message || "Signup failed";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
