<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Smart Traffic System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <h1>SmartTraffic.AI</h1>
        <div class="links">
            <a href="index.html" class="active">Setup</a>
            <a href="dashboard.html">Dashboard</a>
            <a href="rule_breakers.html">Violations</a>
        </div>
    </nav>
    
    <main class="hero">
        <h2>Intelligent Traffic Control</h2>
        <p>Upload 4 video streams representing traffic lanes. Our YOLOv8 engine will dynamically optimize signal timings and detect emergency vehicles in real-time.</p>
        
        <div class="glass-panel" style="width: 100%; max-width: 800px;">
            <div class="upload-grid">
                <!-- Lane 1 -->
                <label class="upload-box" id="box-1">
                    <span style="font-size: 2rem;">📥</span>
                    <span style="margin-top: 8px; font-weight: 500;">Lane 1 Video</span>
                    <span id="label-1" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">MP4 format</span>
                    <input type="file" id="file-1" accept="video/mp4" onchange="handleFileSelect(1)">
                </label>
                <!-- Lane 2 -->
                <label class="upload-box" id="box-2">
                    <span style="font-size: 2rem;">📥</span>
                    <span style="margin-top: 8px; font-weight: 500;">Lane 2 Video</span>
                    <span id="label-2" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">MP4 format</span>
                    <input type="file" id="file-2" accept="video/mp4" onchange="handleFileSelect(2)">
                </label>
                <!-- Lane 3 -->
                <label class="upload-box" id="box-3">
                    <span style="font-size: 2rem;">📥</span>
                    <span style="margin-top: 8px; font-weight: 500;">Lane 3 Video</span>
                    <span id="label-3" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">MP4 format</span>
                    <input type="file" id="file-3" accept="video/mp4" onchange="handleFileSelect(3)">
                </label>
                <!-- Lane 4 -->
                <label class="upload-box" id="box-4">
                    <span style="font-size: 2rem;">📥</span>
                    <span style="margin-top: 8px; font-weight: 500;">Lane 4 Video</span>
                    <span id="label-4" style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 4px;">MP4 format</span>
                    <input type="file" id="file-4" accept="video/mp4" onchange="handleFileSelect(4)">
                </label>
            </div>
            
            <button class="btn-primary" id="start-btn" onclick="startSystem()">Initialize System</button>
            <div id="status-msg" style="margin-top: 16px; min-height: 20px;"></div>
        </div>
    </main>

    <script src="config.js"></script>
    <script src="script.js"></script>

</body>
</html>
